$color = rgba(28, 30, 38, 0.4)
$inner_color = rgba(28, 30, 38, 0.5)
$outer_color = rgb(0, 195, 255)
$font_color = rgb(196, 195, 194)
$placeholder_color = rgba(250, 218, 209, 0.7)
$check_color = rgb(0, 255, 179)
$font = SF Pro Display Bold

general {
    ignore_empty_input = true
}

animations {
    enabled = true
    animation = fadeLayersIn, 1, 5, default
    animation = fadeLayersOut, 1, 4, default
    animation = inputFieldDots, 1, 10, default
    animation = inputFieldWidth, 1, 10, default
}

auth {
    fingerprint:enabled = true
}

background {
    monitor = DP-1
    path = ~/.cache/lock-wallpapers/DP-1.png
    color = $color
    blur_passes = 2
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}
background {
    monitor = DP-3
    path = ~/.cache/lock-wallpapers/DP-3.png
    color = $color
    blur_passes = 2
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# Day
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A")"
    color = rgba(116, 206, 232, 0.7)
    font_size = 90
    font_family = $font
    position = 0, 350
    halign = center
    valign = center
}

# Date-Month
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%d %B")"
    color = rgba(116, 206, 232, 0.7)
    font_size = 40
    font_family = $font
    position = 0, 250
    halign = center
    valign = center
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"- %I:%M -")</span>"
    color = rgba(116, 206, 232, 0.7)
    font_size = 20
    font_family = $font
    position = 0, 190
    halign = center
    valign = center
}

# USER-BOX
shape {
    monitor =
    size = 300, 60
    color = rgba(255, 255, 255, .1)
    rounding = -1
    border_size = 0
    border_color = rgba(255, 255, 255, 0)
    rotate = 0
    xray = false # if true, make a "hole" in the background (rectangle of specified size, no rotation)

    position = 0, -130
    halign = center
    valign = center
}

# USER
label {
    monitor =
    text =     $USER
    color = rgba(216, 222, 233, 0.80)
    font_size = 18
    font_family = $font
    position = 0, -130
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 300, 60
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(255, 255, 255, 0)
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = rgb(0, 0, 0)
    fade_on_empty = false
    fade_timeout = 1000
    font_family = $font
    placeholder_text = <i><span foreground="##ffffff99">Pass</span></i>
    hide_input = false
    position = 0, -210
    halign = center
    valign = center
}

# Reboot
label {
    monitor =
    text = 󰜉
    color = rgb(222, 118, 240)
    font_size = 50
    onclick = reboot now
    position = 0, 100
    halign = center
    valign = bottom
}

# Power off
label {
    monitor =
    text = 󰐥
    color = rgb(222, 118, 240)
    font_size = 50
    onclick = shutdown now
    position = 820, 100
    halign =left 
    valign = bottom
}

# Suspend
label {
    monitor =
    text = 󰤄
    color = rgb(222, 118, 240)
    font_size = 50
    onclick = systemctl suspend
    position = -820, 100
    halign = right
    valign = bottom
}